<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="תור מקלחת">
<meta name="theme-color" content="#0d0d1a">
<title>תור מקלחת</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230d0d1a'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle'%3E%F0%9F%9A%BF%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:#0d0d1a; --card:#16162a; --accent1:#7c6aff; --accent2:#ff6ab0;
    --accent3:#6affda; --text:#f0eeff; --muted:#6b688a; --border:rgba(124,106,255,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overscroll-behavior:none}
  body{
    font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;min-height:-webkit-fill-available;
    display:flex;flex-direction:column;align-items:center;
    padding:max(env(safe-area-inset-top),28px) 16px calc(env(safe-area-inset-bottom,0px) + 40px);
    position:relative;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;top:-120px;left:-120px;width:420px;height:420px;
    background:radial-gradient(circle,rgba(124,106,255,.18) 0%,transparent 70%);
    border-radius:50%;pointer-events:none;z-index:0;
  }
  body::after{
    content:'';position:fixed;bottom:-80px;right:-80px;width:300px;height:300px;
    background:radial-gradient(circle,rgba(255,106,176,.14) 0%,transparent 70%);
    border-radius:50%;pointer-events:none;z-index:0;
  }
  .wrapper{position:relative;z-index:1;width:100%;max-width:420px}

  /* ── Install banners ── */
  #installBanner{
    display:none;background:linear-gradient(135deg,rgba(124,106,255,.12),rgba(255,106,176,.08));
    border:1px solid var(--border);border-radius:16px;padding:14px 14px;margin-bottom:20px;
    align-items:center;gap:10px;
  }
  #installBanner.show{display:flex}
  .install-text{flex:1;font-size:.82rem;color:var(--text);line-height:1.4}
  .install-text strong{color:var(--accent3);display:block;margin-bottom:2px}
  #btnInstall{
    background:var(--accent1);color:#fff;border:none;border-radius:10px;
    padding:8px 14px;font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:700;
    cursor:pointer;white-space:nowrap;flex-shrink:0;
  }
  #btnDismiss{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;flex-shrink:0;padding:2px 6px}

  #iosTip{
    display:none;background:rgba(106,255,218,.06);border:1px solid rgba(106,255,218,.18);
    border-radius:16px;padding:14px 16px;margin-bottom:20px;font-size:.82rem;color:var(--text);line-height:1.7;
  }
  #iosTip.show{display:block}
  #iosTip strong{color:var(--accent3)}
  .close-tip{float:left;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;margin-right:4px}

  /* ── Header ── */
  h1{
    font-size:2rem;font-weight:900;text-align:center;margin-bottom:4px;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;letter-spacing:-1px;
  }
  .subtitle{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:28px;font-weight:300}

  /* ── Cards ── */
  .result-area{display:flex;flex-direction:column;gap:14px;margin-bottom:28px;min-height:210px}
  .person-card{
    background:var(--card);border:1px solid var(--border);border-radius:18px;
    padding:18px 22px;display:flex;align-items:center;gap:16px;
    opacity:0;transform:translateY(30px);transition:opacity .5s ease,transform .5s ease;
  }
  .person-card.visible{opacity:1;transform:translateY(0)}
  .person-card:nth-child(1){transition-delay:.1s}
  .person-card:nth-child(2){transition-delay:.3s}
  .person-card:nth-child(3){transition-delay:.5s}
  .rank-badge{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;flex-shrink:0}
  .rank-1{background:linear-gradient(135deg,#ffd700,#ffb300);color:#2a1a00}
  .rank-2{background:linear-gradient(135deg,#c0c0c0,#9e9e9e);color:#1a1a1a}
  .rank-3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}
  .person-info{flex:1}
  .person-name{font-size:1.3rem;font-weight:700}
  .person-order{font-size:.82rem;color:var(--muted);margin-top:2px}
  .shower-icon{font-size:1.6rem}

  /* ── Buttons ── */
  .btn-draw{
    width:100%;padding:18px;border:none;border-radius:18px;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;
    font-family:'Heebo',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;
    letter-spacing:.5px;position:relative;overflow:hidden;
    transition:transform .15s,box-shadow .15s;
    box-shadow:0 8px 30px rgba(124,106,255,.35);margin-bottom:12px;
  }
  .btn-draw:active{transform:scale(.97);box-shadow:0 4px 16px rgba(124,106,255,.25)}
  .btn-draw::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);border-radius:inherit;
  }
  .btn-save{
    width:100%;padding:14px;border:1.5px solid var(--accent3);border-radius:14px;
    background:transparent;color:var(--accent3);font-family:'Heebo',sans-serif;
    font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,color .2s;
    display:none;margin-bottom:28px;
  }
  .btn-save:active{background:var(--accent3);color:var(--bg)}

  /* ── Toast ── */
  .toast{
    position:fixed;bottom:30px;left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--accent3);color:var(--bg);padding:12px 24px;
    border-radius:30px;font-weight:700;font-size:.95rem;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* ── History ── */
  .divider{width:100%;height:1px;background:var(--border);margin:8px 0 24px}
  .history-title{font-size:1rem;font-weight:700;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .history-list{display:flex;flex-direction:column;gap:10px}
  .history-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
  .history-item-date{font-size:.78rem;color:var(--muted);margin-bottom:8px}
  .history-item-names{display:flex;gap:8px;flex-wrap:wrap}
  .history-chip{padding:4px 12px;border-radius:20px;font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:5px}
  .chip-1{background:rgba(255,215,0,.12);color:#ffd700;border:1px solid rgba(255,215,0,.25)}
  .chip-2{background:rgba(192,192,192,.1);color:#c0c0c0;border:1px solid rgba(192,192,192,.2)}
  .chip-3{background:rgba(205,127,50,.12);color:#cd7f32;border:1px solid rgba(205,127,50,.25)}
  .no-history{text-align:center;color:var(--muted);font-size:.88rem;padding:16px 0}

  @keyframes drop{0%{transform:translateY(-10px);opacity:1}100%{transform:translateY(60px);opacity:0}}
  .drop-particle{position:fixed;font-size:1.2rem;pointer-events:none;z-index:1000;animation:drop .9s ease-in forwards}
</style>
</head>
<body>
<div class="wrapper">

  <div id="installBanner">
    <div class="install-text"><strong>📲 התקן כאפליקציה</strong>פתח מהר ישירות ממסך הבית</div>
    <button id="btnInstall">התקן</button>
    <button id="btnDismiss">✕</button>
  </div>

  <div id="iosTip">
    <button class="close-tip" onclick="this.closest('#iosTip').classList.remove('show')">✕</button>
    <strong>📲 הוסף למסך הבית (iPhone)</strong><br>
    לחץ על <strong>⎙ שתף</strong> בסאפרי ← בחר <strong>"הוסף למסך הבית"</strong>
  </div>

  <h1>🚿 תור מקלחת</h1>
  <p class="subtitle">לחצו להגרלה – מי נכנס ראשון?</p>

  <div class="result-area" id="resultArea">
    <div style="text-align:center;color:var(--muted);margin:auto;font-size:.95rem">לחצו על הגרלה כדי להתחיל</div>
  </div>

  <button class="btn-draw" onclick="draw()">🎲 הגרל עכשיו</button>
  <button class="btn-save" id="btnSave" onclick="saveResult()">💾 שמור תוצאה</button>

  <div class="divider"></div>
  <div class="history-title"><span>📅</span> היסטוריית הגרלות</div>
  <div class="history-list" id="historyList"></div>
</div>

<div class="toast" id="toast">נשמר! ✓</div>

<script>
// ── Inline PWA manifest ───────────────────────────────────────────────────────
(function() {
  const m = {
    name:'תור מקלחת', short_name:'מקלחת',
    description:'הגרלת סדר מקלחת יומית',
    start_url:'.', display:'standalone',
    background_color:'#0d0d1a', theme_color:'#0d0d1a',
    dir:'rtl', lang:'he',
    icons:[
      {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230d0d1a'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle'%3E%F0%9F%9A%BF%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'},
      {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%230d0d1a'/%3E%3Ctext x='256' y='370' font-size='300' text-anchor='middle'%3E%F0%9F%9A%BF%3C/text%3E%3C/svg%3E",sizes:'512x512',type:'image/svg+xml'}
    ]
  };
  const url = URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}));
  Object.assign(document.createElement('link'),{rel:'manifest',href:url,id:'_mf'});
  document.head.appendChild(document.getElementById('_mf') || (() => {
    const l = document.createElement('link'); l.rel='manifest'; l.href=url;
    document.head.appendChild(l); return l;
  })());
})();

// ── Inline Service Worker (offline cache) ────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `
const C='shower-v1';
self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname])))});
self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res}).catch(()=>caches.match(e.request))))});
  `;
  const url = URL.createObjectURL(new Blob([sw],{type:'text/javascript'}));
  navigator.serviceWorker.register(url).catch(()=>{});
}

// ── Install prompt ────────────────────────────────────────────────────────────
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const standalone = window.matchMedia('(display-mode:standalone)').matches || navigator.standalone;
let deferredPrompt = null;

if (!standalone) {
  if (isIOS) {
    setTimeout(()=>document.getElementById('iosTip').classList.add('show'), 700);
  } else {
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('installBanner').classList.add('show');
    });
  }
}
document.getElementById('btnInstall').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
};
document.getElementById('btnDismiss').onclick = () =>
  document.getElementById('installBanner').classList.remove('show');

// ── App ───────────────────────────────────────────────────────────────────────
const NAMES        = ['עלמא','ליה','רועי'];
const ORDER_LABELS = ['ראשון/ה','שני/ה','שלישי/ה'];
const RANK_ICONS   = ['🥇','🥈','🥉'];
const STORAGE_KEY  = 'shower_history';
let currentResult = null, drawn = false;

const shuffle = arr => {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
};

const fmtKey = d =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey     = () => fmtKey(new Date());
const yesterdayKey = () => { const d=new Date(); d.setDate(d.getDate()-1); return fmtKey(d); };

function getYesterdayFirst() {
  const hist = loadHistory();
  const yKey = yesterdayKey();
  for (const e of hist) {
    if (!e.dateKey) continue;
    if (e.dateKey === yKey) return e.order[0];
    if (e.dateKey < yKey)   break;
  }
  return null;
}

function draw() {
  const blocked = getYesterdayFirst();
  if (blocked) {
    const others  = NAMES.filter(n=>n!==blocked);
    const first   = others[Math.floor(Math.random()*others.length)];
    currentResult = [first, ...shuffle(NAMES.filter(n=>n!==first))];
  } else {
    currentResult = shuffle(NAMES);
  }
  drawn = true;
  renderResult(blocked);
  spawnDrops();
  document.getElementById('btnSave').style.display = 'block';
}

function renderResult(blocked) {
  const area = document.getElementById('resultArea');
  area.innerHTML = '';
  if (blocked) {
    const n = document.createElement('div');
    n.style.cssText = 'font-size:.8rem;color:var(--accent2);text-align:center;margin-bottom:6px;opacity:.85';
    n.textContent = `⚠️ ${blocked} היה/תה ראשון/ה אתמול – לא יכול/ה להיות ראשון/ה שוב`;
    area.appendChild(n);
  }
  currentResult.forEach((name,i) => {
    const c = document.createElement('div');
    c.className = 'person-card';
    c.innerHTML = `
      <div class="rank-badge rank-${i+1}">${i+1}</div>
      <div class="person-info">
        <div class="person-name">${name}</div>
        <div class="person-order">${ORDER_LABELS[i]} להיכנס</div>
      </div>
      <div class="shower-icon">${RANK_ICONS[i]}</div>`;
    area.appendChild(c);
    requestAnimationFrame(() => setTimeout(() => c.classList.add('visible'), 50+i*180));
  });
}

function saveResult() {
  if (!drawn || !currentResult) return;
  const hist = loadHistory();
  const now  = new Date();
  hist.unshift({
    date: now.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'}) + ' ' +
          now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}),
    dateKey: todayKey(),
    order: [...currentResult]
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(hist.slice(0,30)));
  renderHistory();
  toast('נשמר! ✓');
  drawn = false;
  document.getElementById('btnSave').style.display = 'none';
}

const loadHistory = () => { try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{return [];} };

function renderHistory() {
  const list = document.getElementById('historyList');
  const hist = loadHistory();
  if (!hist.length) { list.innerHTML='<div class="no-history">אין הגרלות שמורות עדיין</div>'; return; }
  list.innerHTML = hist.map(h=>`
    <div class="history-item">
      <div class="history-item-date">📅 ${h.date}</div>
      <div class="history-item-names">
        ${h.order.map((n,i)=>`<div class="history-chip chip-${i+1}">${RANK_ICONS[i]} ${n}</div>`).join('')}
      </div>
    </div>`).join('');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function spawnDrops() {
  ['💧','💦','🚿','✨','⭐'].forEach((em,i) => {
    const el = document.createElement('div');
    el.className='drop-particle'; el.textContent=em;
    el.style.left=(15+Math.random()*70)+'vw';
    el.style.top=(25+Math.random()*35)+'vh';
    el.style.animationDelay=(i*.1)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1500);
  });
}

renderHistory();
</script>
</body>
</html>
